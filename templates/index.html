<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="static/css/style.css">
    <title>TriPy</title>
</head>
<body>
    <div id="content">

    <h1>TriPy</h1>
    <form action="/tri" method="get" onsubmit="loading()">
        <p>Choisissez la longueur de l'array à trier :</p>
        <input type="range" id="array-length" name="array-length" min="1" max="30" value="15" oninput="updateValue()">
        <span id="array-length-value">-</span>
        <p>Choisissez l'algorithme que vous souhaitez visualiser :</p>
        <button type="submit" name="sort" value="selection">Tri par sélection</button>
        <button type="submit" name="sort" value="insertion">Tri par insertion</button>
        <button type="submit" name="sort" value="bubble">Tri à bulles</button>
    </form>

    </div> 

    <div id="loading">
        <img src="static/settings.gif" alt="Loading...">
    </div>
       
    <script src="static/js/script.js"></script>
</body>
</html>
